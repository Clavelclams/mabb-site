; .user.ini — overrides PHP locales pour mabb-site
; Ce fichier est lu par PHP-CGI (utilisé par symfony serve) à chaque requête.
; Pas besoin de redémarrer PHP — recharge juste la page après modif.

; Taille max d'un fichier uploadé (notamment trombinoscope FFBB qui peut faire ~15 Mo avec photos)
upload_max_filesize = 25M

; Taille max du POST entier (doit être >= upload_max_filesize, on prend une petite marge)
post_max_size = 30M

; Mémoire max par requête (parsing PDF peut consommer)
memory_limit = 256M

; Durée max d'une requête (parsing d'un gros PDF peut prendre 10-20s)
max_execution_time = 60
