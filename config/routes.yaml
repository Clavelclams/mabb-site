# Routes principales — monolithe multi-host MABB
#
# Chaque espace (vitrine, manager, pirb) a son propre fichier de routes
# avec une contrainte de host pour isoler les espaces.
#
# En dev (localhost), seules les routes vitrine repondent par defaut.
# Pour tester manager/pirb en local, ajouter dans le fichier hosts :
#   127.0.0.1  manager.localhost  pirb.localhost

# Import des routes par espace
vitrine:
    resource: routes/vitrine.yaml

manager:
    resource: routes/manager.yaml

pirb:
    resource: routes/pirb.yaml

# Saison — sélecteur global accessible depuis tous les espaces (manager + pirb)
# Déclaration explicite (pas de host constraint = répond sur tous les subdomains).
# On n'utilise PAS resource/{path,namespace} car ce format attend un répertoire,
# pas un fichier unique — ça provoquerait une RouteNotFoundException en prod.
saison_changer:
    path: /saison/changer
    controller: App\Controller\SaisonController::changer
    methods: [POST]

# API (pas de contrainte host — securise par JWT)
api_controllers:
    resource:
        path: ../src/Controller/Api/
        namespace: App\Controller\Api
    type: attribute
    prefix: /api
# Admin — sécurisé dans le controller (SUPER_ADMIN uniquement)
admin_controllers:
    resource:
        path: ../src/Controller/Admin/
        namespace: App\Controller\Admin
    type: attribute
