# Routes manager — manager.mabb.fr (prod) ou manager.localhost (dev)
# Le domain est résolu via APP_HOST_DOMAIN (.env / .env.local)
manager_controllers:
    resource:
        path: ../../src/Controller/Manager/
        namespace: App\Controller\Manager
    type: attribute
    host: '{subdomain}.{domain}'
    defaults:
        subdomain: manager
        domain: '%app.host_domain%'
    requirements:
        subdomain: 'manager'
        domain: 'mabb\.fr|localhost'
