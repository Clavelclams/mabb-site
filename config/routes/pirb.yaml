# Routes PIRB — pirb.mabb.fr (prod) ou pirb.localhost (dev)
# Le domain est résolu via APP_HOST_DOMAIN (.env / .env.local)
pirb_controllers:
    resource:
        path: ../../src/Controller/Pirb/
        namespace: App\Controller\Pirb
    type: attribute
    host: '{subdomain}.{domain}'
    defaults:
        subdomain: pirb
        domain: '%app.host_domain%'
    requirements:
        subdomain: 'pirb'
        domain: '(mabb\.fr|localhost)'
