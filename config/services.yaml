# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Domaine utilisé pour les routes multi-host (manager.* et pirb.*).
    # Résolu depuis APP_HOST_DOMAIN (.env / .env.local).
    # On passe par un paramètre car les %env()% ne sont pas autorisés
    # directement dans les fichiers de routing pour des raisons de sécurité.
    app.host_domain: '%env(APP_HOST_DOMAIN)%'

    # [V2.4h] Slug du club servi par la VITRINE publique (mabb.fr).
    # La vitrine est mono-club : les formulaires publics (pré-inscription
    # licence) se rattachent à CE club. En multi-club SaaS, ce paramètre
    # deviendra une résolution par host — point noté au backlog.
    app.club_vitrine_slug: 'mabb'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Service d'upload des PDFs FFBB officiels (résumé, feuille, positions tirs).
    # Le dossier d'upload est injecté en string — pas auto-wireable.
    App\Service\RencontrePdfUploader:
        arguments:
            $uploadDirectory: '%kernel.project_dir%/public/uploads/rencontres'

    # Service d'upload des documents attachés aux réunions (Bureau Phase F).
    App\Service\ReunionDocumentUploader:
        arguments:
            $uploadBaseDirectory: '%kernel.project_dir%/public/uploads/reunions'

    # Service d'upload des justificatifs des opérations de trésorerie (Bureau Phase D.1).
    # Les fichiers sont stockés dans un sous-dossier par club pour multi-tenant.
    App\Service\JustificatifOperationUploader:
        arguments:
            $uploadBaseDirectory: '%kernel.project_dir%/public/uploads/tresorerie'

    # Service d'upload des justificatifs des notes de frais (Bureau Phase D.2).
    # Même base que les opérations mais sous-dossier "notes_frais/" — séparation
    # pour faciliter les exports et purges spécifiques.
    App\Service\JustificatifNoteFraisUploader:
        arguments:
            $uploadBaseDirectory: '%kernel.project_dir%/public/uploads/tresorerie'

    # Service d'upload des photos de profil joueurs (PIRB Phase C — #58).
    # Stockage dans public/uploads/joueurs/{joueurId}_{uniqid}.{ext}
    App\Service\JoueurPhotoUploader:
        arguments:
            $uploadBaseDirectory: '%kernel.project_dir%/public/uploads/joueurs'

    # Service d'upload des médias d'une fiche séance (ContenuSeance) — B-Seances V1.
    # Stockage par club : public/uploads/seances/{clubId}/{uniqid}.{ext}
    # Supporte images (JPEG/PNG/WEBP/GIF) + PDFs. Max 5 Mo par fichier.
    App\Service\ContenuSeanceMediaUploader:
        arguments:
            $uploadBaseDirectory: '%kernel.project_dir%/public/uploads/seances'

    # Service mailer des convocations (Bureau Phase E).
    # L'email et le nom expéditeur sont injectés depuis .env / .env.local
    # → JAMAIS de valeurs en clair ici (velito-credentials-policy).
    App\Service\ConvocationMailerService:
        arguments:
            $expediteurEmail: '%env(EMAIL_EXPEDITEUR)%'
            $expediteurNom:   '%env(EMAIL_NOM_EXPEDITEUR)%'

    # B1 — Reset password : injecte l'expéditeur admin@mabb.fr (MAILER_FROM).
    # Convention : tout ce qui est administratif passe par admin@mabb.fr,
    # tout ce qui est contact public vitrine par contact@mabb.fr.
    App\Service\Security\ResetPasswordTokenManager:
        arguments:
            $mailerFrom: '%env(MAILER_FROM)%'

    # B2 — RGPD anonymizer : doit savoir où sont les uploads pour supprimer
    # physiquement les photos lors de l'anonymisation.
    App\Service\Rgpd\RgpdAnonymizer:
        arguments:
            $uploadsRoot: '%kernel.project_dir%/public'

    # B20 — Import PDFs FFBB : a besoin du project_dir pour stocker
    # les fichiers dans public/uploads/rencontres/{id}/
    App\Command\ImportPdfsFfbbCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # B22a — Téléchargement PDF FFBB côté PIRB joueuse
    # [15/06/2026] Bind $projectDir retiré : refactor PirbStatsController::downloadPdf
    # utilise maintenant RencontrePdfUploader::getAbsolutePath (DRY).
    # Symfony 7.4 strict refuse les bindings non utilisés au boot.

    # B30c — Invitation parent par mail
    App\Service\Security\ParentInvitationManager:
        arguments:
            $mailerFrom: '%env(MAILER_FROM)%'

    # B22b — Parser PDF resume FFBB
    App\Service\Ffbb\FfbbResumeParser:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # B22c — Parser PDF positiontir FFBB (V1 sans coordonnées graphiques)
    App\Service\Ffbb\FfbbPositionTirParser:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # ENT Documents — upload de documents club (Planning, Règlement, CR, etc.)
    # Stockage par club : public/uploads/ent/{clubId}/{uniqid}.{ext}
    # Max 20 Mo, formats bureautiques + images.
    App\Service\DocumentUploader:
        arguments:
            $uploadBaseDirectory: '%kernel.project_dir%/public/uploads/ent'

    # Décharges signées des sorties (Lot D v2 — RGPD-0010).
    # ⚠️ HORS public/ : données de mineures + signatures parentales, jamais
    # servies en direct par le serveur web. Lecture via contrôleur uniquement
    # (BinaryFileResponse derrière ClubVoter::CLUB_STAFF).
    App\Service\DechargeSortieUploader:
        arguments:
            $uploadBaseDirectory: '%kernel.project_dir%/var/decharges'

    # [B-FFBB-OCR 15/06/2026] Google Vision OCR
    # Le fichier google-vision-key.json contient la clé service account et NE DOIT
    # JAMAIS être committé (cf. .gitignore /config/credentials/).
    # En prod, déposer la même clé via SCP dans le même chemin sur OVH.
    App\Service\Ffbb\GoogleVisionOcrService:
        arguments:
            $googleVisionKeyPath: '%kernel.project_dir%/config/credentials/google-vision-key.json'
