security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Core\User
                property: email

    firewalls:
        # --- Dev tools (toujours accessible) ---
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # --- API (JWT stateless) — à activer en Phase 2+ ---
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            # jwt: ~   # décommenter quand LexikJWT sera installé

        # --- Vitrine (mabb.fr / www.mabb.fr / localhost) — public, login form ---
        vitrine:
            host: '^(www\.mabb\.fr|mabb\.fr|localhost|127\.0\.0\.1)(:\d+)?$'
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: vitrine_compte_se_connecter
                check_path: vitrine_compte_se_connecter
                username_parameter: _email
                password_parameter: _password
                default_target_path: vitrine_accueil
                always_use_default_target_path: false
            logout:
                path: vitrine_logout
                target: vitrine_accueil
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800  # 7 jours

        # --- Manager (manager.mabb.fr) — auth obligatoire ---
        manager:
            host: '^manager\.(mabb\.fr|localhost)(:\d+)?$'
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: manager_login
                check_path: manager_login
                username_parameter: _email
                password_parameter: _password
                default_target_path: manager_dashboard
            logout:
                path: manager_logout
                target: manager_login

        # --- PIRB (pirb.mabb.fr) — auth obligatoire ---
        pirb:
            host: '^pirb\.(mabb\.fr|localhost)(:\d+)?$'
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: pirb_login
                check_path: pirb_login
                username_parameter: _email
                password_parameter: _password
                default_target_path: pirb_dashboard
            logout:
                path: pirb_logout
                target: pirb_login

        # --- Fallback (ne devrait pas être atteint en prod) ---
        main:
            lazy: true
            provider: app_user_provider

    # Hiérarchie des rôles Symfony (héritage)
    # NB : les rôles métier (COACH, JOUEUR...) sont dans UserClubRole, PAS ici
    role_hierarchy:
        ROLE_SUPER_ADMIN: [ROLE_USER]

    access_control:
        # API : auth obligatoire
        # - { path: ^/api, roles: ROLE_USER }

        # Manager : tout le sous-domaine manager.* nécessite d'être connecté
        # - { host: '^manager\.', roles: ROLE_USER }

        # PIRB : tout le sous-domaine pirb.* nécessite d'être connecté
        # - { host: '^pirb\.', roles: ROLE_USER }

        # Vitrine : public par défaut, sauf /compte/profil etc.
        # - { path: ^/compte/profil, roles: ROLE_USER }
